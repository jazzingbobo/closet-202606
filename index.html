      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav">

    <div class="carousel-indicators">
      <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="第 1 張"></button>
      <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="1" aria-label="第 2 張"></button>
      <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="2" aria-label="第 3 張"></button>
      <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="3" aria-label="第 4 張"></button>
      <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="4" aria-label="第 5 張"></button>
    </div>
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="images/img-1.jpg" alt="時裝伸展台展示">
      </div>
      <div class="carousel-item">
        <img src="images/img-2.jpg" alt="女性時尚穿搭">
      </div>
      <div class="carousel-item">
        <img src="images/img-3.jpg" alt="春夏服裝系列">
      </div>
      <div class="carousel-item">
        <img src="images/img-4.jpg" alt="服裝店內陳列">
      </div>
      <div class="carousel-item">
        <img src="images/img-5.jpg" alt="街頭時尚造型">
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#mainCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">上一張</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#mainCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">下一張</span>
    </button>
  </header>

  <main>
    <section id="about" class="section-space">
      <div class="container">
        <div class="row align-items-center g-5">
          <div class="col-lg-6">
            <img class="about-image" src="images/img-4.jpg" alt="品牌選品形象">
          </div>
          <div class="col-lg-6">
            <h1 class="section-title">關於我們</h1>
            <p class="about-copy">
              Closet 以俐落剪裁與日常實穿為核心，精選適合不同場合的服飾單品。從上班、約會到旅行，我們希望每一次搭配都能保留自在感，也展現屬於你的風格。
            </p>
            <p class="about-copy mb-0">
              每季依照材質、版型與搭配度挑選新品，讓衣櫃更容易被整理，也讓穿搭選擇變得簡單而有質感。
            </p>
          </div>
        </div>
      </div>
    </section>

    <section id="products" class="product-area">
      <div class="container">
        <div class="row justify-content-center g-5">
          <div class="col-md-6">
            <article class="card product-card">
              <img src="images/img-2.jpg" class="card-img-top" alt="女裝造型商品">
              <div class="card-body w-100 px-0 pb-0">
                <a href="#" class="btn btn-product">瞭解更多</a>
              </div>
            </article>
          </div>
          <div class="col-md-6">
            <article class="card product-card">
              <img src="images/img-3.jpg" class="card-img-top" alt="度假風格商品">
              <div class="card-body w-100 px-0 pb-0">
                <a href="#" class="btn btn-product">瞭解更多</a>
              </div>
            </article>
          </div>
        </div>
      </div>
    </section>
  </main>

  <a class="back-to-top" href="#top" aria-label="回到頁首">
    <span aria-hidden="true">↑</span>
  </a>
